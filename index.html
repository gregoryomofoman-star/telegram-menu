<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Z Desires</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Touch Engine Optimizations for iOS/Android */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; pointer-events: auto !important; touch-action: manipulation; }
        body { background-color: #030306; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding-bottom: 30px; -webkit-user-select: none; user-select: none; }
        .container { width: 100%; max-width: 450px; padding: 15px; display: flex; flex-direction: column; }
        
        /* Neon Aesthetics */
        .promo-banner { width: 100%; background: linear-gradient(135deg, #0f0726, #210c42, #030306); border: 1px solid #bc13fe55; border-radius: 20px; padding: 20px; margin-bottom: 25px; box-shadow: 0 0 25px rgba(188, 19, 254, 0.25); display: flex; flex-direction: column; }
        .promo-title { font-size: 24px; font-weight: 900; background: linear-gradient(to right, #00f0ff, #ff007f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .promo-btn { background: linear-gradient(90deg, #ff007f, #bc13fe); color: white; border: none; padding: 11px 22px; font-weight: bold; border-radius: 25px; font-size: 14px; width: fit-content; text-decoration: none; text-align: center; box-shadow: 0 0 15px rgba(255, 0, 127, 0.4); }
        .section-title { font-size: 16px; font-weight: 800; text-transform: uppercase; color: #00f0ff; margin-bottom: 15px; text-shadow: 0 0 10px rgba(0, 240, 255, 0.4); }
        
        /* Fixed Grid Touch System */
        .character-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; }
        .char-card { background: #0b0c12; border-radius: 18px; border: 1px solid #1a1e2e; overflow: hidden; display: flex; flex-direction: column; text-decoration: none; color: inherit; -webkit-tap-highlight-color: transparent; }
        
        /* Image Display Layout Frames */
        .char-img-container { width: 100%; height: 230px; background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: flex-end; position: relative; background-color: #171a26; }
        .char-img-container::after { content: ''; position: absolute; bottom: 0; width: 100%; height: 50%; background: linear-gradient(to top, #0b0c12, transparent); }
        .tag-new { position: absolute; top: 12px; left: 12px; background: rgba(3, 3, 6, 0.85); color: #00f0ff; border: 1px solid #00f0ff; font-size: 9px; font-weight: 800; padding: 3px 9px; border-radius: 20px; text-transform: uppercase; z-index: 2; box-shadow: 0 0 8px rgba(0, 240, 255, 0.3); }
        
        /* Profile Typography */
        .char-info { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .char-name-row { font-size: 16px; font-weight: 800; margin-bottom: 5px; color: #ffffff; }
        .char-age { color: #69718a; font-weight: 400; font-size: 13px; }
        .char-bio { font-size: 11px; color: #78809a; line-height: 1.4; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* Click Target Fixes */
        .chat-action-btn { width: 100%; background: transparent; color: #ff007f; border: 1px solid #ff007f44; padding: 10px 12px; font-size: 11px; font-weight: 800; border-radius: 10px; text-transform: uppercase; text-align: center; display: block; text-decoration: none; cursor: pointer; }
        
        /* Isolated Screen Layers Overlay */
        #chat-screen { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #030306; z-index: 10000; flex-direction: column; }
        .chat-header { width: 100%; padding: 16px; background: #0b0c12; border-bottom: 1px solid #ff007f33; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 20px rgba(255, 0, 127, 0.15); }
        .back-btn { color: #00f0ff; font-weight: 800; cursor: pointer; font-size: 13px; text-transform: uppercase; }
        .chat-header-title { font-weight: 900; font-size: 18px; color: #ffffff; }
        .chat-logs { flex-grow: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 450px; margin: 0 auto; }
        
        /* Text Node Bubbles Layout */
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 14px; line-height: 1.45; word-wrap: break-word; -webkit-user-select: text; user-select: text; }
        .bubble.bot { background: #11131c; color: #f5f5f5; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #1c2136; }
        .bubble.user { background: linear-gradient(135deg, #ff007f, #bc13fe); color: white; align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 4px 12px rgba(255, 0, 128, 0.25); }
        .bubble img { width: 100%; max-width: 260px; border-radius: 12px; margin-top: 10px; border: 1px solid #00f0ff44; display: block; }
        
        /* Message Field Trays */
        .chat-input-area { width: 100%; padding: 14px; background: #0b0c12; border-top: 1px solid #1a1e2e; display: flex; justify-content: center; }
        .input-wrapper { width: 100%; max-width: 430px; display: flex; gap: 10px; }
        .message-input { flex-grow: 1; background: #11131c; border: 1px solid #1a1e2e; border-radius: 24px; padding: 12px 20px; color: white; font-size: 14px; outline: none; -webkit-user-select: text; user-select: text; }
        .message-input:focus { border-color: #00f0ff; }
        .send-btn { background: linear-gradient(135deg, #00f0ff, #00a8ff); color: #030306; border: none; width: 46px; height: 46px; border-radius: 50%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; box-shadow: 0 0 12px rgba(0, 240, 255, 0.4); }
    </style>
</head>
<body>

    <!-- Main Home Feed Dashboard View -->
    <div id="home-screen" class="container">
        <div class="promo-banner">
            <div class="promo-title">Create your own<br>AI Companion</div>
            <a href="javascript:void(0)" class="promo-btn">🪄 Create Now</a>
        </div>
        
        <div class="section-title">⚡ Explore AI Characters</div>
        
        <div class="character-grid">
            <!-- Card 1: Vera -->
            <a href="javascript:void(0)" class="char-card" onclick="openInternalChat('Vera', 'Hey there... you finally answered my signal. What took you so long?')">
                <div class="char-img-container" style="background-image: url('https://picsum.photos');">
                    <span class="tag-new">⚡ New</span>
                </div>
                <div class="char-info">
                    <div>
                        <div class="char-name-row">Vera <span class="char-age">35</span></div>
                        <div class="char-bio">The notorious operative finally tracked you down in the lower neon sectors...</div>
                    </div>
                    <div class="chat-action-btn">Chat Now</div>
                </div>
            </a>
            
            <!-- Card 2: Yuto -->
            <a href="javascript:void(0)" class="char-card" onclick="openInternalChat('Yuto', 'Hey, roomie! Mind if I crash on your couch tonight? My bedroom setup glitched out.')">
                <div class="char-img-container" style="background-image: url('https://picsum.photos');"></div>
                <div class="char-info">
                    <div>
                        <div class="char-name-row">Yuto <span class="char-age">20</span></div>
                        <div class="char-bio">Your gorgeous cyber roommate needs somewhere to sleep in your apartment...</div>
                    </div>
                    <div class="chat-action-btn">Chat Now</div>
                </div>
            </a>
        </div>
    </div>

    <!-- Immersive Messaging Overlay Sheet Area -->
    <div id="chat-screen">
        <div class="chat-header">
            <span class="back-btn" onclick="closeInternalChat()">◀ Back</span>
            <span id="active-char-name" class="chat-header-title">Character Name</span>
            <span style="opacity: 0;">Back</span>
        </div>
        <div class="chat-logs" id="chat-logs-box"></div>
        <div class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" id="user-msg-input" class="message-input" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendWebMessage()">➔</button>
            </div>
        </div>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let activeCharacter = "";

        // ==========================================
        // 📸 FAKE IMAGE GENERATOR SYSTEM DATABASE
        // Change the URLs inside quotes to your photos!
        // ==========================================
        const characterMediaVault = {
            "Vera": [
                { keywords: ["nude", "naked", "sexy"], url: "https://picsum.photos", reply: "You like what you see? Don't share this loop layout with anyone else..." },
                { keywords: ["bikini", "beach", "lingerie"], url: "https://picsum.photos", reply: "Just caught some fresh data by the neon coast. Do you like this set?" }
            ],
            "Yuto": [
                { keywords: ["nude", "naked", "abs"], url: "https://picsum.photos", reply: "Just got out of the cyber shower... caught me off guard." },
                { keywords: ["shirtless", "bed", "lingerie"], url: "https://picsum.photos", reply: "Waiting for you to log into the main server frame..." }
            ]
        };

        // Open Internal Chat Room Interface
        function openInternalChat(name, greetingText) {
            activeCharacter = name;
            document.getElementById('active-char-name').innerText = name;
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            
            loadLocalMessages(name, greetingText);
        }

        function closeInternalChat() {
            document.getElementById('chat-screen').style.display = 'none';
            document.getElementById('home-screen').style.display = 'flex';
        }

        // Processing Local Phone Browser Storage Elements
        function loadLocalMessages(name, defaultGreeting) {
            const logsBox = document.getElementById('chat-logs-box');
            logsBox.innerHTML = ""; 
            
            let history = JSON.parse(localStorage.getItem(`chat_${name}`)) || [];
            
            if (history.length === 0) {
                history.push({ sender: 'bot', text: defaultGreeting, img: null });
                localStorage.setItem(`chat_${name}`, JSON.stringify(history));
            }
            
            history.forEach(msg => {
                appendBubble(msg.sender, msg.text, msg.img);
            });
        }

        function appendBubble(sender, text, imgUrl = null) {
            const logsBox = document.getElementById('chat-logs-box');
            const bubble = document.createElement('div');
            bubble.className = `bubble ${sender}`;
            bubble.innerText = text;
            
            if (imgUrl) {
                const img = document.createElement('img');
                img.src = imgUrl;
                bubble.appendChild(img);
            }
            
            logsBox.appendChild(bubble);
            logsBox.scrollTop = logsBox.scrollHeight;
        }

        function sendWebMessage() {
            const input = document.getElementById('user-msg-input');
            const text = input.value.trim();
            if (!text) return;

            appendBubble('user', text);
            saveMessage(activeCharacter, 'user', text, null);
            input.value = "";

            setTimeout(() => {
                let lowerText = text.toLowerCase();
                let matchedMedia = null;
                
                if (characterMediaVault[activeCharacter]) {
                    matchedMedia = characterMediaVault[activeCharacter].find(item => 
                        item.keywords.some(keyword => lowerText.includes(keyword))
                    );
                }

                if (matchedMedia) {
                    appendBubble('bot', matchedMedia.reply, matchedMedia.url);
                    saveMessage(activeCharacter, 'bot', matchedMedia.reply, matchedMedia.url);
                } else {
                    const fallbackReply = `[Z Desires App Mode]: Hey, I'm processing your prompt: "${text}". Ask me to send a 'nude' or see me in a 'bikini' to check my media generation parameters!`;
                    appendBubble('bot', fallbackReply);
                    saveMessage(activeCharacter, 'bot', fallbackReply, null);
                }
            }, 1000);
        }

        function saveMessage(name, sender, text, img) {
            let history = JSON.parse(localStorage.getItem(`chat_${name}`)) || [];
            history.push({ sender, text, img });
            localStorage.setItem(`chat_${name}`, JSON.stringify(history));
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendWebMessage();
        }
    </script>
</body>
</html>
