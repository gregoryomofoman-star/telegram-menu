<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Z Desires</title>
    <script src="https://telegram.org"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; pointer-events: auto; }
        body { background-color: #020204; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding-bottom: 20px; }
        .container { width: 100%; max-width: 450px; padding: 15px; display: flex; flex-direction: column; z-index: 5; }
        
        /* Neon Aesthetics */
        .promo-banner { width: 100%; background: linear-gradient(135deg, #0a051b, #190933, #020204); border: 1px solid #bc13fe55; border-radius: 20px; padding: 20px; margin-bottom: 25px; box-shadow: 0 0 25px rgba(188, 19, 254, 0.25); display: flex; flex-direction: column; }
        .promo-title { font-size: 24px; font-weight: 900; background: linear-gradient(to right, #00f0ff, #ff007f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .promo-btn { background: linear-gradient(90deg, #ff007f, #bc13fe); color: white; border: none; padding: 11px 22px; font-weight: bold; border-radius: 25px; font-size: 14px; width: fit-content; cursor: pointer; box-shadow: 0 0 15px rgba(255, 0, 127, 0.4); }
        .section-title { font-size: 16px; font-weight: 800; text-transform: uppercase; color: #00f0ff; margin-bottom: 15px; text-shadow: 0 0 10px rgba(0, 240, 255, 0.4); display: flex; align-items: center; gap: 6px; }
        
        /* Grid and Clickable Card Engine Layout Fixes */
        .character-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; position: relative; }
        .char-card { background: #090a0f; border-radius: 18px; border: 1px solid #161925; overflow: hidden; display: flex; flex-direction: column; cursor: pointer; position: relative; transition: transform 0.2s, border-color 0.2s; -webkit-tap-highlight-color: transparent; }
        .char-card:active { transform: scale(0.96); border-color: #ff007f; box-shadow: 0 0 15px rgba(255, 0, 127, 0.2); }
        
        /* Image Display Frame Configurations */
        .char-img-container { width: 100%; height: 230px; background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: flex-end; position: relative; background-color: #121420; }
        .char-img-container::after { content: ''; position: absolute; bottom: 0; width: 100%; height: 50%; background: linear-gradient(to top, #090a0f, transparent); }
        .tag-new { position: absolute; top: 12px; left: 12px; background: rgba(2, 2, 4, 0.85); color: #00f0ff; border: 1px solid #00f0ff; font-size: 9px; font-weight: 800; padding: 3px 9px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; z-index: 2; box-shadow: 0 0 8px rgba(0, 240, 255, 0.3); }
        
        /* Information Blocks */
        .char-info { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; background: #090a0f; position: relative; z-index: 3; }
        .char-name-row { font-size: 16px; font-weight: 800; margin-bottom: 5px; color: #ffffff; display: flex; align-items: center; gap: 5px; }
        .char-age { color: #626880; font-weight: 400; font-size: 13px; }
        .char-bio { font-size: 11px; color: #717791; line-height: 1.4; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .chat-action-btn { width: 100%; background: transparent; color: #ff007f; border: 1px solid #ff007f44; padding: 10px 12px; font-size: 11px; font-weight: 800; border-radius: 10px; text-transform: uppercase; cursor: pointer; transition: 0.2s; letter-spacing: 0.5px; }
        
        /* Complete View Frame Layout For Chat Screens Overlay */
        #chat-screen { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #020204; z-index: 1000; flex-direction: column; }
        .chat-header { width: 100%; padding: 16px; background: #090a0f; border-bottom: 1px solid #ff007f33; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 20px rgba(255, 0, 127, 0.15); }
        .back-btn { color: #00f0ff; font-weight: 800; cursor: pointer; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        .chat-header-title { font-weight: 900; font-size: 18px; color: #ffffff; letter-spacing: 0.5px; }
        .chat-logs { flex-grow: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 450px; margin: 0 auto; }
        
        /* Conversation Message Nodes */
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 14px; line-height: 1.45; word-wrap: break-word; }
        .bubble.bot { background: #0e1017; color: #f5f5f5; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #161925; }
        .bubble.user { background: linear-gradient(135deg, #ff007f, #bc13fe); color: white; align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 4px 12px rgba(255, 0, 128, 0.25); }
        .bubble img { width: 100%; max-width: 260px; border-radius: 12px; margin-top: 8px; border: 1px solid #00f0ff44; display: block; box-shadow: 0 0 10px rgba(0, 240, 255, 0.2); }
        
        /* User Interaction Trays */
        .chat-input-area { width: 100%; padding: 14px; background: #090a0f; border-top: 1px solid #161925; display: flex; justify-content: center; }
        .input-wrapper { width: 100%; max-width: 430px; display: flex; gap: 10px; }
        .message-input { flex-grow: 1; background: #0e1017; border: 1px solid #161925; border-radius: 24px; padding: 12px 20px; color: white; font-size: 14px; outline: none; transition: border-color 0.2s; }
        .message-input:focus { border-color: #00f0ff; box-shadow: 0 0 8px rgba(0, 240, 255, 0.2); }
        .send-btn { background: linear-gradient(135deg, #00f0ff, #00a8ff); color: #020204; border: none; width: 46px; height: 46px; border-radius: 50%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; box-shadow: 0 0 12px rgba(0, 240, 255, 0.4); }
    </style>
</head>
<body>

    <!-- Main Home Feed Dashboard -->
    <div id="home-screen" class="container">
        <div class="promo-banner">
            <div class="promo-title">Create your own<br>AI Companion</div>
            <button class="promo-btn">🪄 Create Now</button>
        </div>
        
        <div class="section-title">⚡ Explore AI Characters</div>
        
        <div class="character-grid">
            <!-- Card 1: Vera -->
            <div class="char-card" onclick="openInternalChat('Vera', 'Hey there... you finally answered my signal. What took you so long?')">
                <div class="char-img-container" style="background-image: url('https://picsum.photos');">
                    <span class="tag-new">⚡ New</span>
                </div>
                <div class="char-info">
                    <div>
                        <div class="char-name-row">Vera <span class="char-age">35</span></div>
                        <div class="char-bio">The notorious operative finally tracked you down in the lower neon sectors...</div>
                    </div>
                    <button class="chat-action-btn">Chat Now</button>
                </div>
            </div>
            
            <!-- Card 2: Yuto -->
            <div class="char-card" onclick="openInternalChat('Yuto', 'Hey, roomie! Mind if I crash on your couch tonight? My bedroom setup glitched out.')">
                <div class="char-img-container" style="background-image: url('https://picsum.photos');"></div>
                <div class="char-info">
                    <div>
                        <div class="char-name-row">Yuto <span class="char-age">20</span></div>
                        <div class="char-bio">Your gorgeous cyber roommate needs somewhere to sleep in your apartment...</div>
                    </div>
                    <button class="chat-action-btn">Chat Now</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Immersive Messaging Overlay Sheet Area -->
    <div id="chat-screen">
        <div class="chat-header">
            <span class="back-btn" onclick="closeInternalChat()">◀ Back</span>
            <span id="active-char-name" class="chat-header-title">Character Name</span>
            <span style="opacity: 0;">Back</span>
        </div>
        <div class="chat-logs" id="chat-logs-box"></div>
        <div class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" id="user-msg-input" class="message-input" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendWebMessage()">➔</button>
            </div>
        </div>
    </div>
