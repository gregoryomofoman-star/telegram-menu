<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Z Desires</title>
    <script src="https://telegram.org"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #050508; color: #ffffff; min-height: 100vh; overflow-x: hidden; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; padding: 15px; display: flex; flex-direction: column; }
        .promo-banner { width: 100%; background: linear-gradient(135deg, #120e2e, #25123e, #050508); border: 1px solid #bc13fe33; border-radius: 20px; padding: 20px; margin-bottom: 25px; box-shadow: 0 0 20px rgba(188, 19, 254, 0.15); display: flex; flex-direction: column; }
        .promo-title { font-size: 24px; font-weight: 900; background: linear-gradient(to right, #00f0ff, #ff007f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; text-transform: uppercase; }
        .promo-btn { background: linear-gradient(90deg, #ff007f, #bc13fe); color: white; border: none; padding: 10px 20px; font-weight: bold; border-radius: 25px; font-size: 14px; width: fit-content; }
        .section-title { font-size: 18px; font-weight: 800; text-transform: uppercase; color: #00f0ff; margin-bottom: 15px; text-shadow: 0 0 10px rgba(0, 240, 255, 0.3); }
        .character-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        .char-card { background: #0d0e15; border-radius: 16px; border: 1px solid #1f2335; overflow: hidden; display: flex; flex-direction: column; }
        .char-img-container { width: 100%; height: 220px; background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: flex-end; position: relative; }
        .char-img-container::after { content: ''; position: absolute; bottom: 0; width: 100%; height: 50%; background: linear-gradient(to top, #0d0e15, transparent); }
        .tag-new { position: absolute; top: 10px; left: 10px; background: rgba(0, 0, 0, 0.75); color: #00f0ff; border: 1px solid #00f0ff; font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; z-index: 2; }
        .char-info { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .char-name-row { font-size: 16px; font-weight: 800; margin-bottom: 4px; }
        .char-age { color: #888da8; font-weight: 400; font-size: 14px; }
        .char-bio { font-size: 11px; color: #7a819b; line-height: 1.3; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .chat-action-btn { width: 100%; background: transparent; color: #ff007f; border: 1px solid #ff007f33; padding: 8px 10px; font-size: 12px; font-weight: 700; border-radius: 8px; text-transform: uppercase; cursor: pointer; text-align: center; }
        .chat-action-btn:active { background: #ff007f; color: white; }
        #chat-screen { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #050508; z-index: 100; flex-direction: column; }
        .chat-header { width: 100%; padding: 15px; background: #0d0e15; border-bottom: 1px solid #ff007f33; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 15px rgba(255, 0, 127, 0.1); }
        .back-btn { color: #00f0ff; font-weight: bold; cursor: pointer; font-size: 14px; text-transform: uppercase; }
        .chat-header-title { font-weight: 800; font-size: 18px; color: #ffffff; }
        .chat-logs { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 450px; margin: 0 auto; }
        .bubble { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        .bubble.bot { background: #121420; color: #f5f5f5; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #1f2335; }
        .bubble.user { background: linear-gradient(135deg, #ff007f, #bc13fe); color: white; align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 2px 10px rgba(255, 0, 128, 0.2); }
        .chat-input-area { width: 100%; padding: 12px; background: #0d0e15; border-top: 1px solid #1f2335; display: flex; justify-content: center; }
        .input-wrapper { width: 100%; max-width: 430px; display: flex; gap: 8px; }
        .message-input { flex-grow: 1; background: #121420; border: 1px solid #1f2335; border-radius: 24px; padding: 12px 18px; color: white; font-size: 14px; outline: none; }
        .message-input:focus { border-color: #00f0ff; }
        .send-btn { background: #00f0ff; color: #050508; border: none; width: 44px; height: 44px; border-radius: 50%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; box-shadow: 0 0 10px rgba(0, 240, 255, 0.3); }
    </style>
</head>
<body>

    <!-- Home Tab View Screen Structure Layout -->
    <div id="home-screen" class="container">
        <div class="promo-banner">
            <div class="promo-title">Create your own<br>AI Girlfriend</div>
            <button class="promo-btn">🪄 Create Now</button>
        </div>
        
        <div class="section-title">Explore AI Characters</div>
        
        <div class="character-grid">
            <!-- Card 1: Vera -->
            <div class="char-card">
                <div class="char-img-container" style="background-image: url('https://picsum.photos');"><span class="tag-new">⚡ New</span></div>
                <div class="char-info">
                    <div><div class="char-name-row">Vera <span class="char-age">35</span></div><div class="char-bio">The notorious operative finally tracked you down in the lower neon sectors...</div></div>
                    <button class="chat-action-btn" onclick="openInternalChat('Vera', 'Hey there... you finally answered my signal. What took you so long?')">Chat Now</button>
                </div>
            </div>
            <!-- Card 2: Yuto -->
            <div class="char-card">
                <div class="char-img-container" style="background-image: url('https://picsum.photos');"></div>
                <div class="char-info">
                    <div><div class="char-name-row">Yuto <span class="char-age">20</span></div><div class="char-bio">Your gorgeous cyber roommate needs somewhere to sleep in your apartment...</div></div>
                    <button class="chat-action-btn" onclick="openInternalChat('Yuto', 'Hey, roomie! Mind if I crash on your couch tonight? My bedroom setup glitched out.')">Chat Now</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Immersive Messaging Overlay Sheet Area -->
    <div id="chat-screen">
        <div class="chat-header">
            <span class="back-btn" onclick="closeInternalChat()">◀ Back</span>
            <span id="active-char-name" class="chat-header-title">Character Name</span>
            <span style="opacity: 0;">Back</span>
        </div>
        <div class="chat-logs" id="chat-logs-box"></div>
        <div class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" id="user-msg-input" class="message-input" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendWebMessage()">➔</button>
            </div>
        </div>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let activeCharacter = "";

        // Open Internal Application Container Dialogue Layout
        function openInternalChat(name, greetingText) {
            activeCharacter = name;
            document.getElementById('active-char-name').innerText = name;
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            
            loadLocalMessages(name, greetingText);
        }

        function closeInternalChat() {
            document.getElementById('chat-screen').style.display = 'none';
            document.getElementById('home-screen').style.display = 'flex';
        }

        // Processing Local Phone Browser Storage Elements Histories Free Loop
        function loadLocalMessages(name, defaultGreeting) {
            const logsBox = document.getElementById('chat-logs-box');
            logsBox.innerHTML = ""; 
            
            let history = JSON.parse(localStorage.getItem(`chat_${name}`)) || [];
            
            if (history.length === 0) {
                history.push({ sender: 'bot', text: defaultGreeting });
                localStorage.setItem(`chat_${name}`, JSON.stringify(history));
            }
            
            history.forEach(msg => {
                appendBubble(msg.sender, msg.text);
            });
        }

        function appendBubble(sender, text) {
            const logsBox = document.getElementById('chat-logs-box');
            const bubble = document.createElement('div');
            bubble.className = `bubble ${sender}`;
            bubble.innerText = text;
            logsBox.appendChild(bubble);
            logsBox.scrollTop = logsBox.scrollHeight;
        }

        function sendWebMessage() {
            const input = document.getElementById('user-msg-input');
            const text = input.value.trim();
            if (!text) return;

            appendBubble('user', text);
            saveMessage(activeCharacter, 'user', text);
            input.value = "";

            // Isolated Web App Script Output Logic
            setTimeout(() => {
                const replyText = `[Z Desires App Mode]: I read your message here inside the Web App system: "${text}". The chat inside this viewport box is fully disconnected from your external Telegram DM chat tracking log!`;
                appendBubble('bot', replyText);
                saveMessage(activeCharacter, 'bot', replyText);
            }, 1000);
        }

        function saveMessage(name, sender, text) {
            let history = JSON.parse(localStorage.getItem(`chat_${name}`)) || [];
            history.push({ sender, text });
            localStorage.setItem(`chat_${name}`, JSON.stringify(history));
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendWebMessage();
        }
    </script>
</body>
</html>
